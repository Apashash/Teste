kind = "web"
previewPath = "/"
title = "Page de Paiement"
version = "1.0.0"
id = "artifacts/payment-page"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23437

[services.development]
run = "pnpm --filter @workspace/payment-page run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/payment-page", "run", "build" ]
publicDir = "artifacts/payment-page/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23437"
BASE_PATH = "/"
